<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NicoPlan 🏖️</title>
    <script type="module" crossorigin src="/nicoplan/assets/index-IExZsP0E.js"></script>
    <link rel="stylesheet" crossorigin href="/nicoplan/assets/index-BhGLy4qK.css">
  </head>
  <body>
    <!-- CONTENEDOR PRINCIPAL -->
    <div id="app">
      
      <!-- PANTALLA DE LOGIN -->
      <section id="login-view" class="view active">
        <div class="login-card">
          <h1>NicoPlan 🏖️</h1>
          <p>Organización de turnos de verano</p>
          <div class="login-buttons">
            <button id="btn-login-ivan" class="btn btn-primary">Soy Ivan</button>
            <button id="btn-login-iria" class="btn btn-secondary">Soy Iria</button>
          </div>
          <div id="pin-container" class="hidden">
            <p>Introduce tu PIN:</p>
            <input type="password" id="pin-input" maxlength="4" placeholder="••••">
            <button id="btn-login-submit" class="btn">Entrar</button>
          </div>
        </div>
      </section>

      <!-- APLICACIÓN PRINCIPAL (OCULTA HASTA LOGIN) -->
      <section id="main-app" class="hidden">
        <header>
          <div class="logo">NicoPlan 🏖️</div>
          <div class="user-info">
            <span id="logged-user-name"></span>
            <button id="btn-logout" class="btn-small">Salir</button>
          </div>
        </header>

        <nav class="tabs">
          <button class="tab active" data-target="monthly-view">Mes</button>
          <button class="tab" data-target="weekly-view">Semana</button>
          <button class="tab" data-target="horarios-view">Horarios</button>
        </nav>

        <main>
          <!-- Vista Mensual -->
          <div id="monthly-view" class="tab-content active">
            <div class="month-controls">
              <button id="prev-month">◀</button>
              <h2 id="current-month-display">Julio 2026</h2>
              <button id="next-month">▶</button>
            </div>
            <div class="calendar-grid" id="calendar-grid">
              <!-- Días del mes se renderizan aquí -->
            </div>
          </div>

          <!-- Vista Semanal -->
          <div id="weekly-view" class="tab-content hidden">
            <h2 id="current-week-display">Semana 28 (6-12 Jul)</h2>
            <div class="table-container">
              <table id="weekly-table">
                <thead>
                  <tr>
                    <th>Turno</th>
                    <th>L</th><th>M</th><th>X</th><th>J</th><th>V</th><th>S</th><th>D</th>
                  </tr>
                </thead>
                <tbody id="weekly-tbody">
                  <!-- Filas de turnos se renderizan aquí -->
                </tbody>
              </table>
            </div>
            
            <div class="weekly-summary" id="weekly-summary">
              <!-- Recuento semanal -->
            </div>
          </div>

          <!-- Vista de Horarios -->
          <div id="horarios-view" class="tab-content hidden">
            <h2>Horarios Laborales de Iria</h2>
            <div class="upload-section">
              <input type="file" id="foto-horario" accept="image/*">
              <input type="date" id="fecha-horario">
              <input type="time" id="hora-entrada">
              <input type="time" id="hora-salida">
              <button id="btn-upload-horario" class="btn btn-primary">Subir Horario</button>
            </div>
            <div class="gallery" id="horarios-gallery">
              <!-- Horarios subidos -->
            </div>
          </div>
        </main>
      </section>
      
    </div>
  </body>
</html>
