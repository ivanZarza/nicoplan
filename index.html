<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NicoPlan 🏖️</title>
    <script type="module" crossorigin src="/nicoplan/assets/index-DBkLyNGr.js"></script>
    <link rel="stylesheet" crossorigin href="/nicoplan/assets/index-n9Jxw382.css">
  </head>
  <body>
    <!-- CONTENEDOR PRINCIPAL -->
    <div id="app">
      
      <!-- PANTALLA DE LOGIN -->
      <section id="login-view" class="view active">
        <div class="login-card">
          <h1>NicoPlan 🏖️</h1>
          <p>Organización de turnos de verano</p>
          <div class="login-buttons">
            <button id="btn-login-ivan" class="btn btn-primary">Soy Ivan</button>
            <button id="btn-login-iria" class="btn btn-secondary">Soy Iria</button>
          </div>
          <div id="pin-container" class="hidden">
            <p>Introduce tu PIN:</p>
            <input type="password" id="pin-input" maxlength="4" placeholder="••••">
            <button id="btn-login-submit" class="btn">Entrar</button>
          </div>
        </div>
      </section>

      <!-- APLICACIÓN PRINCIPAL (OCULTA HASTA LOGIN) -->
      <section id="main-app" class="hidden">
        <header>
          <div class="logo">NicoPlan 🏖️</div>
          <div class="user-info">
            <span id="logged-user-name"></span>
            <button id="btn-logout" class="btn-small">Salir</button>
          </div>
        </header>

        <nav class="tabs">
          <button class="tab active" data-target="monthly-view">Mes</button>
          <button class="tab" data-target="weekly-view">Semana</button>
          <button class="tab" data-target="horarios-view">Horarios</button>
        </nav>

        <main>
          <!-- Vista Mensual -->
          <div id="monthly-view" class="tab-content active">
            <div class="month-controls">
              <button id="prev-month">◀</button>
              <h2 id="current-month-display">Julio 2026</h2>
              <button id="next-month">▶</button>
            </div>
            <div class="calendar-grid" id="calendar-grid">
              <!-- Días del mes se renderizan aquí -->
            </div>

            <div class="calendar-legend">
              <div class="legend-group">
                <span class="legend-item"><div class="dot ivan"></div> Iván</span>
                <span class="legend-item"><div class="dot iria"></div> Iria</span>
                <span class="legend-item"><div class="dot dudas"></div> Dudas</span>
              </div>
              <div class="legend-group">
                <span class="legend-item"><div class="legend-box partial"></div> A medias</span>
                <span class="legend-item"><div class="legend-box complete"></div> Completo</span>
              </div>
            </div>
          </div>

          <!-- Vista Semanal -->
          <div id="weekly-view" class="tab-content hidden">
            <h2 id="current-week-display">Semana 28 (6-12 Jul)</h2>
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>Turno</th>
                    <th>L</br><small id="th-0"></small></th>
                    <th>M</br><small id="th-1"></small></th>
                    <th>X</br><small id="th-2"></small></th>
                    <th>J</br><small id="th-3"></small></th>
                    <th>V</br><small id="th-4"></small></th>
                    <th>S</br><small id="th-5"></small></th>
                    <th>D</br><small id="th-6"></small></th>
                  </tr>
                </thead>
                <tbody id="weekly-tbody">
                  <!-- JS rows -->
                </tbody>
              </table>
            </div>

            <div class="weekly-notes-container">
              <h3>📝 Notas y Recordatorios</h3>
              <div id="notes-list" class="notes-list">
                <!-- Notas JS -->
              </div>
              <div class="add-note-box">
                <textarea id="new-note-text" placeholder="Escribe un apunte, excursión..."></textarea>
                <button id="btn-add-note" class="btn btn-primary">Añadir Nota</button>
              </div>
            </div>

            <div class="weekly-summary" id="weekly-summary">
              <!-- JS summary -->
            </div>
          </div>

          <!-- Vista de Horarios -->
          <div id="horarios-view" class="tab-content hidden">
            <h2>Horarios Laborales de Iria</h2>
            <div class="upload-section">
              <input type="file" id="foto-horario" accept="image/*">
              <div id="ocr-status" class="hidden" style="color:var(--color-ivan); font-weight:bold; font-size:0.9rem; text-align:center;">Analizando imagen... 🤖</div>
              <input type="date" id="fecha-horario">
              <input type="time" id="hora-entrada">
              <input type="time" id="hora-salida">
              <button id="btn-upload-horario" class="btn btn-primary">Subir Horario</button>
            </div>
            <div class="gallery" id="horarios-gallery">
              <!-- Horarios subidos -->
            </div>
          </div>
        </main>
      </section>
      
    </div>
  </body>
</html>
